services:
  train:
    build: .
    image: routent:latest
    env_file:
      - .env
    volumes:
      # Configs (read-only)
      - ./configs:/app/configs:ro
      # Persistent training artifacts (results/checkpoints nested inside run dirs)
      - ./results:/app/results
      # Cache HuggingFace models between runs
      - hf_cache:/root/.cache/huggingface
    # Usage: docker compose run --rm train --config configs/gsm8k_gpt-5-nano.json

  evaluate:
    build: .
    image: routent:latest
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs:ro
      - ./results:/app/results
      - hf_cache:/root/.cache/huggingface
    entrypoint: ["python", "-u", "routent/scripts/evaluate.py"]

  infer:
    build: .
    image: routent:latest
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs:ro
      - ./results:/app/results:ro
      - hf_cache:/root/.cache/huggingface
    entrypoint: ["python", "-u", "routent/scripts/infer.py"]
    # Usage:
    #   docker compose run --rm infer configs/inference/gsm8k_gpt-5-nano.json "What is 15% of 80?"

volumes:
  hf_cache:
